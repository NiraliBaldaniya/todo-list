<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLAN YOUR DAY</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="left">

            <header>todo list</header>

            <div class="input-box">
                <input type="text" placeholder="Enter a new task">
                <button class="input-btn">Add</button>
            </div>

            <div class="task-list">
                <button>
                    <img src="https://cdn-icons-png.flaticon.com/128/7945/7945278.png">
                    homework
                </button>
                <button>
                    <img src="https://cdn-icons-png.flaticon.com/128/7945/7945278.png">
                    reading
                </button>
                <button>
                    <img src="https://cdn-icons-png.flaticon.com/128/7945/7945278.png">
                    exercise
                </button>
                <button>
                    <img src="https://cdn-icons-png.flaticon.com/128/7945/7945278.png">
                    call back
                </button>
            </div>

        </div>
        <div class="right">
            <h1>Today</h1>
        </div>
    </div>

<script src="script.js"></script>

</body>
</html>
